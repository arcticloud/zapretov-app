name: Build Relokant

on:
  push:
    branches: [main, 'feature/**']
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.38.5'
  CHANNEL: 'dev'

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      HAS_SIGNING: ${{ secrets.ANDROID_SIGNING_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Clean up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get autoremove -y && sudo apt-get clean
          rm -rf ~/.gradle/caches

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install deps
        run: |
          dart pub global activate fastforge
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Prepare
        run: make android-apk-prepare

      - name: Setup signing
        if: env.HAS_SIGNING == 'true'
        run: |
          echo "${{ secrets.ANDROID_SIGNING_KEY }}" | base64 --decode > android/key.jks
          echo "storeFile=$(pwd)/android/key.jks" > android/key.properties
          echo "storePassword=${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}" >> android/key.properties

      - name: Build APK
        run: make android-apk-release

      - name: Collect APKs
        run: |
          mkdir -p out
          cp ./build/app/outputs/flutter-apk/*arm64-v8a*.apk out/Relokant-Android-arm64.apk || true
          cp ./build/app/outputs/flutter-apk/*armeabi-v7a*.apk out/Relokant-Android-arm7.apk || true
          cp ./build/app/outputs/flutter-apk/*x86_64*.apk out/Relokant-Android-x64.apk || true
          cp ./build/app/outputs/flutter-apk/app-release.apk out/Relokant-Android-universal.apk || true
          ls -la out/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: out/
          retention-days: 30

  build-ios:
    runs-on: macos-latest
    env:
      HAS_IOS_SIGNING: ${{ secrets.IOS_DISTRIBUTION_P12 != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install deps
        run: |
          dart pub global activate fastforge
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Prepare
        run: make ios-prepare

      - name: Setup signing
        if: env.HAS_IOS_SIGNING == 'true'
        env:
          P12_BASE64: ${{ secrets.IOS_DISTRIBUTION_P12 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ci_keychain_password
          API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import certificate
          echo "$P12_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Setup App Store Connect API key
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Build IPA
        if: env.HAS_IOS_SIGNING == 'true'
        run: |
          # Build Flutter iOS app (archive only, no export yet)
          flutter build ios --no-codesign --dart-define sentry_dsn= --dart-define FLUTTER_BUILD_NAME=4.0.5 --dart-define FLUTTER_BUILD_NUMBER=40005

          # Archive with Xcode using automatic signing + API key
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/archive/Runner.xcarchive \
            -destination 'generic/platform=iOS' \
            archive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

          # Export IPA
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/exportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"
        env:
          CHANNEL: dev

      - name: Collect IPA
        if: env.HAS_IOS_SIGNING == 'true'
        run: |
          mkdir -p out
          find build/ios/ipa -name "*.ipa" -exec cp {} out/Relokant-iOS.ipa \; || true
          find build/ios/archive -name "*.ipa" -exec cp {} out/Relokant-iOS.ipa \; || true
          ls -la out/

      - name: Upload to TestFlight
        if: env.HAS_IOS_SIGNING == 'true'
        continue-on-error: true
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file out/Relokant-iOS.ipa \
            --apiKey ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            --apiIssuer ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

      - name: Upload IPA artifact
        if: env.HAS_IOS_SIGNING == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: out/
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    env:
      IS_GITHUB_ACTIONS: true
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install deps
        shell: bash
        run: dart pub global activate fastforge

      - name: Prepare
        shell: bash
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          dart run slang

      - name: Download hiddify-core
        shell: bash
        run: |
          mkdir -p hiddify-core/bin
          curl -L https://github.com/hiddify/hiddify-next-core/releases/download/draft/hiddify-lib-windows-amd64.tar.gz | tar xz -C hiddify-core/bin/
          ls -la hiddify-core/bin/

      - name: Build Windows exe installer (Standard)
        run: |
          $env:PATH += ";C:\Program Files (x86)\Inno Setup 6;$env:PUB_CACHE\bin"
          fastforge package --platform windows --targets exe --skip-clean --build-target=lib/main.dart --build-dart-define=sentry_dsn=

      - name: Collect Standard installer
        shell: bash
        run: |
          mkdir -p out
          cp dist/*/*.exe out/Relokant-Windows-Setup.exe || true
          ls -la out/

      - name: Build Windows exe installer (Pro — TUN + admin)
        shell: bash
        run: |
          # Swap manifest to requireAdministrator
          cp windows/runner/runner.exe.manifest windows/runner/runner.exe.manifest.bak
          cp windows/runner/runner.exe.manifest.admin windows/runner/runner.exe.manifest
          # Clean previous build
          rm -rf dist build/windows

      - name: Build Pro
        run: |
          $env:PATH += ";C:\Program Files (x86)\Inno Setup 6;$env:PUB_CACHE\bin"
          fastforge package --platform windows --targets exe --skip-clean --build-target=lib/main.dart --build-dart-define=sentry_dsn= --build-dart-define=ENABLE_TUN=true

      - name: Collect Pro installer
        shell: bash
        run: |
          cp dist/*/*.exe out/Relokant-Windows-Pro-Setup.exe || true
          # Restore original manifest
          mv windows/runner/runner.exe.manifest.bak windows/runner/runner.exe.manifest
          ls -la out/

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: out/
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install deps
        run: |
          brew install create-dmg
          npm install -g appdmg
          dart pub global activate fastforge
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Prepare
        run: make macos-prepare

      - name: Build macOS DMG
        run: |
          fastforge package --platform macos --targets dmg --skip-clean --build-target=lib/main.dart --build-dart-define=sentry_dsn=

      - name: Collect DMG
        run: |
          mkdir -p out
          cp dist/*/*.dmg out/Relokant-macOS.dmg || true
          ls -la out/

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: out/
          retention-days: 30
